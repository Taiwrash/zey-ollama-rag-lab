<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroEntropy | RAG vs Base Comparison</title>
    <meta name="description"
        content="Live side-by-side comparison of Base TinyLlama vs ZeroEntropy-enhanced RAG — powered by Langfuse observability.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #155dfc;
            --primary-glow: rgba(21, 93, 252, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --danger: #f43f5e;
            --langfuse: #7c3aed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* ── Langfuse badge ──────────────────────────────────────── */
        .lf-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.35);
            border-radius: 999px;
            padding: 0.3rem 0.9rem;
            font-size: 0.78rem;
            color: #c4b5fd;
            margin-top: 0.75rem;
            cursor: default;
            transition: background 0.2s;
        }

        .lf-badge svg { flex-shrink: 0; }

        /* ── Trace pill ──────────────────────────────────────────── */
        #tracePill {
            display: none;
            align-items: center;
            gap: 0.5rem;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 999px;
            padding: 0.35rem 1rem;
            font-size: 0.78rem;
            color: #c4b5fd;
            margin: 0 auto 1.5rem;
            width: fit-content;
        }

        /* ── Input box ───────────────────────────────────────────── */
        .input-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .input-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 0.5rem;
        }

        button.primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        button.primary-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        button.primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Comparison grid ─────────────────────────────────────── */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .comparison-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .tag-base { color: var(--text-muted); }
        .tag-rag  { color: var(--accent); }

        .response-text {
            line-height: 1.7;
            font-size: 1.05rem;
            white-space: pre-wrap;
            color: #d1d5db;
            flex: 1;
        }

        /* ── Feedback row ────────────────────────────────────────── */
        .feedback-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .feedback-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-right: auto;
        }

        .fb-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-muted);
            border-radius: 0.6rem;
            padding: 0.35rem 0.9rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .fb-btn:hover { background: rgba(255,255,255,0.12); transform: scale(1.15); }
        .fb-btn.voted-up   { background: rgba(16,185,129,0.2); border-color: var(--accent); color: var(--accent); }
        .fb-btn.voted-down { background: rgba(244,63,94,0.2);  border-color: var(--danger);  color: var(--danger); }
        .fb-btn:disabled   { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── Loader ──────────────────────────────────────────────── */
        .loader-wrapper {
            display: none;
            margin: 2rem auto;
            flex-direction: column;
            align-items: center;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--card-border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite cubic-bezier(0.68, -0.55, 0.27, 1.55);
            position: relative;
        }

        .loader::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px solid transparent;
            border-bottom: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1.5s infinite linear;
            opacity: 0.4;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* ── Toast ───────────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.6rem 1.4rem;
            border-radius: 999px;
            font-size: 0.88rem;
            transition: transform 0.3s ease;
            z-index: 999;
            pointer-events: none;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Responsive ──────────────────────────────────────────── */
        @media (max-width: 768px) {
            .comparison-grid { grid-template-columns: 1fr; }
            .input-box { flex-direction: column; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>ZeroEntropy RAG Lab</h1>
            <p class="subtitle">Comparing Base LLM with Context-Aware Retrieval</p>
            <div class="lf-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
                </svg>
                Traced with Langfuse
            </div>
        </header>

        <!-- Trace ID pill (shown after a query) -->
        <div id="tracePill">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
            </svg>
            <span id="traceIdText">trace: —</span>
        </div>

        <div class="input-box">
            <input type="text" id="queryInput" placeholder="Ask anything about the indexed documents..." />
            <button class="primary-btn" id="sendBtn" onclick="handleAsk()">Query System</button>
        </div>

        <div class="loader-wrapper" id="loader">
            <div class="loader"></div>
            <div class="loading-text">RETRIEVING &amp; GENERATING...</div>
        </div>

        <div class="comparison-grid" id="comparisonGrid">
            <!-- Base Card -->
            <div class="card">
                <div class="card-header tag-base">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    TinyLlama (Base)
                </div>
                <div class="response-text" id="baseResponse">Waiting for query...</div>
                <div class="feedback-row" id="baseFeedbackRow">
                    <span class="feedback-label">Was this helpful?</span>
                    <button class="fb-btn" id="baseThumbUp"   onclick="submitFeedback('base',  1)" title="👍 Good answer">👍</button>
                    <button class="fb-btn" id="baseThumbDown" onclick="submitFeedback('base', -1)" title="👎 Bad answer">👎</button>
                </div>
            </div>

            <!-- RAG Card -->
            <div class="card" style="border-top: 1px solid var(--accent);">
                <div class="card-header tag-rag">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                        </path>
                    </svg>
                    ZeroEntropy RAG
                </div>
                <div class="response-text" id="ragResponse">Waiting for query...</div>
                <div class="feedback-row" id="ragFeedbackRow">
                    <span class="feedback-label">Was this helpful?</span>
                    <button class="fb-btn" id="ragThumbUp"   onclick="submitFeedback('rag',  1)" title="👍 Good answer">👍</button>
                    <button class="fb-btn" id="ragThumbDown" onclick="submitFeedback('rag', -1)" title="👎 Bad answer">👎</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast">Feedback logged to Langfuse ✓</div>

    <script>
        let currentTraceId = null;

        async function handleAsk() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            const sendBtn   = document.getElementById('sendBtn');
            const loader    = document.getElementById('loader');
            const grid      = document.getElementById('comparisonGrid');
            const baseBox   = document.getElementById('baseResponse');
            const ragBox    = document.getElementById('ragResponse');
            const tracePill = document.getElementById('tracePill');

            // Reset UI
            sendBtn.disabled = true;
            loader.style.display = 'flex';
            grid.classList.remove('visible');
            tracePill.style.display = 'none';
            currentTraceId = null;
            resetFeedbackButtons();

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                if (response.ok) {
                    baseBox.innerText = data.base_response;
                    ragBox.innerText  = data.rag_response;
                    grid.classList.add('visible');

                    // Surface trace ID
                    if (data.trace_id) {
                        currentTraceId = data.trace_id;
                        document.getElementById('traceIdText').textContent =
                            `trace: ${data.trace_id.slice(0, 8)}…`;
                        tracePill.style.display = 'flex';
                    }
                } else {
                    alert('Error: ' + data.detail);
                }
            } catch (err) {
                alert('Connection error: ' + err.message);
            } finally {
                sendBtn.disabled = false;
                loader.style.display = 'none';
            }
        }

        async function submitFeedback(mode, value) {
            if (!currentTraceId) return;

            const upBtn   = document.getElementById(`${mode}ThumbUp`);
            const downBtn = document.getElementById(`${mode}ThumbDown`);

            // Optimistic UI
            upBtn.disabled   = true;
            downBtn.disabled = true;
            upBtn.classList.toggle('voted-up',   value === 1);
            downBtn.classList.toggle('voted-down', value === -1);

            try {
                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trace_id: currentTraceId, mode, value })
                });
                showToast(`${value === 1 ? '👍' : '👎'} Logged to Langfuse`);
            } catch (err) {
                console.error('Feedback error:', err);
            }
        }

        function resetFeedbackButtons() {
            ['base', 'rag'].forEach(mode => {
                const up   = document.getElementById(`${mode}ThumbUp`);
                const down = document.getElementById(`${mode}ThumbDown`);
                if (up && down) {
                    up.disabled = down.disabled = false;
                    up.className = down.className = 'fb-btn';
                }
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2800);
        }

        // Enter-key support
        document.getElementById('queryInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') handleAsk();
        });
    </script>
</body>

</html>
